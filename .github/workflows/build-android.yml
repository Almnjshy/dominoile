name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      # ─── 1. سحب الكود ───
      - name: Checkout
        uses: actions/checkout@v4

      # ─── 2. Node.js 20 ───
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── 3. تثبيت Dependencies + Capacitor ───
      - name: Install Dependencies & Capacitor
        run: |
          npm ci
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # ─── 4. إنشاء capacitor.config.json يدوياً ───
      - name: Create Capacitor Config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.almnjshy.dominoile",
            "appName": "Domino Master",
            "webDir": "dist",
            "bundledWebRuntime": false
          }
          EOF

      # ─── 5. إضافة Android Platform ───
      - name: Add Android Platform
        run: npx cap add android

      # ─── 6. بناء الويب ───
      - name: Build Web App
        run: npm run build

      # ─── 7. JDK 17 ───
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ─── 8. Android SDK ───
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ─── 9. مزامنة Capacitor ───
      - name: Sync Capacitor
        run: npx cap sync android

      # ─── 10. بناء Debug APK ───
      - name: Build Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      # ─── 11. رفع APK ───
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: domino-master-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
