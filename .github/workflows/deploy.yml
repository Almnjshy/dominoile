name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Fix NPM Registry
        run: |
          npm config set registry https://registry.npmjs.org/
          rm -f package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Fix TypeScript Config
        run: |
          sed -i 's/"compilerOptions": {/"compilerOptions": {\n    "ignoreDeprecations": "6.0",/' tsconfig.app.json

      - name: Fix Vite Config
        run: |
          sed -i "/import { inspectAttr } from 'kimi-plugin-inspect-react'/d" vite.config.ts
          sed -i "s/inspectAttr(), //g" vite.config.ts
          sed -i "s/inspectAttr(),//g" vite.config.ts
          sed -i "s/inspectAttr()//g" vite.config.ts

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
